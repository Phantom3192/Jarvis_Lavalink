server:
  port: 5000
  address: 0.0.0.0

lavalink:
  server:
    password: "jarvisbot"
    sources:
      youtube: false
      soundcloud: true
      http: true
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - TVHTML5_SIMPLY
      - MUSIC
      - IOS
    oauth:
      enabled: false
  lavasrc:
    providers:
      - "ytdlpsearch:%QUERY%"
      - "ytsearch:%QUERY%"
    sources:
      ytdlp: true
      youtube: false
      spotify: false
      applemusic: false
      deezer: false
    ytdlp:
      path: "yt-dlp"
      searchLimit: 10

logging:
  level:
    root: INFO
    lavalink: INFO
