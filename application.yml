server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "jarvisbot"
    bufferDurationMs: 1000
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    sources:
      youtube: false
      soundcloud: true
      http: true
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true

